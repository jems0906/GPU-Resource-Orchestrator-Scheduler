databases:
  - name: gpu-orchestrator-db
    databaseName: gpu_orchestrator
    user: gpu_user

services:
  - type: keyvalue
    name: gpu-orchestrator-redis
    plan: free
    ipAllowList: []

  - type: web
    name: gpu-orchestrator-backend
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: gpu-orchestrator-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: gpu-orchestrator-redis
          property: connectionString
      - key: DEFAULT_API_KEY
        value: dev-api-key-change-in-production
      - key: SECRET_KEY
        generateValue: true
      - key: LOG_LEVEL
        value: INFO
      - key: ALLOWED_ORIGINS
        value: '["https://gpu-orchestrator-frontend.onrender.com"]'

  - type: web
    name: gpu-orchestrator-frontend
    runtime: node
    rootDir: frontend
    buildCommand: npm ci && npm run build
    startCommand: npm run preview -- --host 0.0.0.0 --port $PORT
    envVars:
      - key: VITE_API_BASE_URL
        value: https://gpu-orchestrator-backend.onrender.com
      - key: VITE_WS_BASE_URL
        value: wss://gpu-orchestrator-backend.onrender.com
      - key: VITE_API_KEY
        value: dev-api-key-change-in-production
